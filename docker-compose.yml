version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketrush_db
    environment:
      POSTGRES_USER: ticketrush
      POSTGRES_PASSWORD: ticketrush123
      POSTGRES_DB: ticketrush
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ticketrush']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticketrush_redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
