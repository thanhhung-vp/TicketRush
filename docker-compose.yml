version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketrush_db
    environment:
      POSTGRES_USER: ticketrush
      POSTGRES_PASSWORD: ticketrush123
      POSTGRES_DB: ticketrush
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ticketrush']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticketrush_redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ticketrush_backend
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: production
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ticketrush_frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
